  <script>
    let m = new Map()
    function containerDuplicate (data) {
      for (let i = 0; i < data.length; i++) {
        const el = data[i];
        if(m.has(data[i])) {
          return true
        } else {
          m.set(data[i], i)
        }
      }
      return false
    }
    console.log(containerDuplicate([1,2,3,4]))
    console.log(containerDuplicate([1,2,3,4,1]))
  </script>

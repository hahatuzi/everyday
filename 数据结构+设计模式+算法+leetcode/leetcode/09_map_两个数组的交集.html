      }
      for (let i = 0; i < arr2.length; i++) {
        const element = arr2[i];
        if(m.has(arr2[i])) {

        }
      }

    }
    function intersection1 (arr1, arr2) {
      let s1 = new Set(arr1)
      return [...new Set(arr2)].filter(item => s1.has(item))

  <script>
    function removeDuplicates (str) {
      let s1 = new Stack()
      for (const v of str) {
        const el = s1.pop();
        console.log(s1);
        
        if (el != v) {
          s1.push(el)
          s1.push(v)
        }
      }
      return s1.items.join('')
    }
    console.log(removeDuplicates('abbaca'))
    console.log(removeDuplicates('abbbsaca'))
  </script>

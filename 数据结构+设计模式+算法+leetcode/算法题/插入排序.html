<body>
  <script>
    function insertSort (data) {
      for (let i = 0; i < data.length; i++) {
        let j = i + 1
        while (j >= 1) {
          if(data[j] < data[j - 1]){
            let temp = data[j]
            data[j] = data[j - 1]
            data[j -1] = temp
          }
          j--
        }
      }
      return data
    }
    console.log(insertSort([34, 2, 5, 1, 654, 7]))
    // 1-->(2,1)
    // 2-->(3,2)(3,1)
    // 3-->(4,3)(4,2)(4,1)
    // n-->(n,n-1)
  </script>
</body>

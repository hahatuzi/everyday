  <script>
      function choiceSort(arr) {
        for (let i = 0; i < arr.length - 1; i++) {
          // let min = arr[i]
          // for (let j = i + 1; j <= arr.length - 1; j++) {
          //   if(arr[j] < min) {
          //     let temp = min
          //     min = arr[j]
          //     arr[j] = temp
          //   }
          // }
          // arr[i] = min
          let min = i
          for (let j = i + 1; j <= arr.length - 1; j++) {
            if (arr[i] > arr[j]) {
          // 这里只需要交换一次索引即可
              min = j
            }
          }
          let temp = arr[i]
          arr[i] = arr[min]
          arr[min] = temp
        }
        return arr
      }
    console.log(choiceSort([34, 2, 5, 1, 654, 7]))
    // 0 --> 0,length
    // 1 --> 1,length
  </script>

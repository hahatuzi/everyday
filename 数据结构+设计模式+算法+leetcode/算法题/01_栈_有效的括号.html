<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script src="./栈_00_栈结构.js"></script>
  <script>
    function isValid (str) {
      let s1 = new Stack()
      for (let i = 0; i < str.length; i++) {
        if (['(','[','{'].includes(str[i])){
          s1.push(str[i])
        } else {
          if(s1.length != 0) {
            let el = s1.peek()
            if(['()','[]','{}'].includes( el + str[i])) {
              s1.pop()
            }
          } else {
            return false
          }
        }
      }
      return s1.items.length == 0
    }
    console.log(isValid('(]{(})'))// false
    console.log(isValid('(){}[)'))// false
    console.log(isValid('[]()'))// true
  </script>
</body>
</html>

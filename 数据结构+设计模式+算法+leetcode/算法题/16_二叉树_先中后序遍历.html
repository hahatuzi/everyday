  <script>
    let bst = new BinarySearchTree()
    bst.insert(11)
    bst.insert(7)
    bst.insert(15)
    bst.insert(5)
    bst.insert(3)
    bst.insert(9)
    bst.insert(8)
    bst.insert(10)

    bst.insert(20)
    bst.insert(18)
    bst.insert(25)
    bst.insert(6)
    console.log(bst)
    let res1 = ''
    bst.preOrderTraversal(key => {
      res1 += (key + ',')
    })
    console.log(res1)
    console.log(bst.preOrderTraversal1().join(','))
    console.log(bst.midOrderTraversal1().join(','))
    let res2 = ''
    bst.midOrderTraversal(key => {
      res2 += (key + ',')
    })
    console.log(res2)
    let res3 = ''
    bst.postOrderTraversal(key => {
      res3 += (key + ',')
    })
    console.log(res3)
    console.log(bst.postOrderTraversal1().join(','))
  </script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    function guess (number) {
      let res = 15
      if (number === res) return 0
      if (number > res) return 1
      if (number < res) return -1
    }
    function guessNumber (number) {
      let low = 1
      let high = number
      while( low <= high){
        let mid = Math.floor((low+high ) /2)
        let res = guess(mid)
        if (res === 0 ) {
          return mid
        } else if (res === 1) {
          high = mid - 1
        } else {
          low = mid + 1
        }
      }
    }
    console.log(guessNumber(50))
  </script>
</body>
</html>

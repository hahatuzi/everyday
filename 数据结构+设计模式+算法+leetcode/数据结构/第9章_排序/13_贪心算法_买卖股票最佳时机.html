<body>
  <script>
    function maxProfit (nums) {
      let res = 0
      for (let i = 0; i < nums.length; i++) {
        if(nums[i] > nums[i -1]){
          res += nums[i] - nums[i -1]
        }
      }
      return res
    }
    console.log(maxProfit([3,1,2,4,2,6]))
  </script>
</body>

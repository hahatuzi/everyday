<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    function canJump (nums) {
      let cover = 0
      for (let i = 0; i < nums.length; i++) {
        if(i <= cover){
          cover = Math.max(nums[i] + 1, cover)
          if(cover >= nums.length - 1) {
            return true
          }
        }
      }
      return false
    }
    console.log(canJump([1,2,0,1,4]))
  </script>
</body>
</html>

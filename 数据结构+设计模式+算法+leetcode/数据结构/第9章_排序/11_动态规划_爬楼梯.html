  <script>
    function fn (n) {
      let dp = [1,1]
      for (let i = 2; i <= n; i++) {
        dp[i] = dp[i - 1] + dp[i - 2]
      }
      console.log(dp)
      return dp[n]
    }
    console.log(fn(9))
  </script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    function guess (arr,target) {
      let start = 0
      let end = arr.length - 1
      while(start <= end){
        let i = Math.floor((start + end)/2)
        let guess = arr[i]
        if(guess < target) {
          start = i + 1
        } else if(guess > target){
          end = i - 1
        } else {
          return i
        }
      }
    }
    console.log(guess([1,2,3,4,5,7,8,9],7))
  </script>
</body>
</html>

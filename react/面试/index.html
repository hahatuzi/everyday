<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    // currentDispatcher --> resolvedDispatcher
    let count = 0
    window.addEventListener('click', () => {
      count++
    }, false)

    // 调度器scheduler
    const workLoop = () => {
      // render() 直接render会导致无限刷新，而我们只想要在数据变化的时候再刷新页面，所以添加判断reconcile
      reconcile()
      // react 不使用requestIdleCallback或者scheduler.postTask，而是设计了scheduler包来处理优先级调度任务
      requestIdleCallback(() => {
        workLoop()
      })

      // 或者
      // 如果当前帧还有剩余时间，并且任务列表还有任务，那么执行任务
      while(deadline.timeRemaining() > 1 && workList.length > 0) {
        performUnitOfWork()
      }
    }
    function performUnitOfWork(){
      const work = workList.shift()
      work()
    }
    // 在数据变化的时候再刷新页面
    let precount = count
    const reconcile = () => {
      if(precount !== count){
        render()
        precount = count
      }
    }
    const render = () => {
      console.log('🚀🚀render' + count)
      document.body.innerHTML = count
    }
    // render()
    workLoop()
  </script>
</body>
</html>
